<style>
    /* ── BOUTONS PARTAGE ── */
    .share-section {
        text-align: center;
        margin: 48px 0;
        padding: 40px;
        background: var(--gold-light);
        border-radius: 20px;
    }

    .share-section h3 {
        font-family: 'Fraunces', serif;
        font-size: 1.3rem;
        margin-bottom: 8px;
    }

    .share-section p {
        color: var(--muted);
        margin-bottom: 20px;
        font-size: 0.9rem;
    }

    .share-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .share-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 100px;
        font-size: 0.85rem;
        font-weight: 600;
        text-decoration: none;
        color: white;
        transition: transform 0.2s, opacity 0.2s;
    }

    .share-btn:hover {
        transform: translateY(-2px);
        opacity: 0.9;
    }

    .share-wa {
        background: #25D366;
    }

    .share-fb {
        background: #1877F2;
    }

    .share-in {
        background: #0A66C2;
    }

    .share-tw {
        background: #000000;
    }
</style>

    <!-- Google Translate IP-Based Script -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
        (function() {
            try {
                // Table de correspondance Pays -> Langue
                var countryToLang = {
                    'DE': 'de', 'AT': 'de', 'CH': 'de',
                    'ES': 'es', 'MX': 'es', 'AR': 'es', 'CO': 'es', 'PE': 'es', 'CL': 'es',
                    'US': 'en', 'GB': 'en', 'CA': 'en', 'AU': 'en', 'NZ': 'en',
                    'IT': 'it', 
                    'PT': 'pt', 'BR': 'pt',
                    'CN': 'zh-CN', 'TW': 'zh-TW', 
                    'JP': 'ja', 
                    'RU': 'ru', 
                    'SA': 'ar', 'AE': 'ar', 'MA': 'ar', 'DZ': 'ar', 'EG': 'ar',
                    'NL': 'nl', 
                    'TR': 'tr'
                };

                if (document.cookie.indexOf('googtrans=') === -1 && !sessionStorage.getItem('ip_checked')) {
                    sessionStorage.setItem('ip_checked', 'true');
                    fetch('https://get.geojs.io/v1/ip/country.json')
                    .then(response => response.json())
                    .then(data => {
                        var country = data.country;
                        var langCode = countryToLang[country];
                        if (langCode && langCode !== 'fr') {
                            var domain = window.location.hostname;
                            document.cookie = "googtrans=/fr/" + langCode + "; path=/; domain=" + (domain || "");
                            document.cookie = "googtrans=/fr/" + langCode + "; path=/";
                            window.location.reload();
                        } else {
                            document.cookie = "googtrans=/fr/fr; path=/";
                        }
                    })
                    .catch(e => console.error(e));
                }
            } catch(e) {}
        })();
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'fr', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
